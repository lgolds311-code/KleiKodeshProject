name: CI - Build Check

on:
  pull_request:
    branches:
      - master
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source (with submodules)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Nucleus
        uses: kdroidFilter/Nucleus/.github/actions/setup-nucleus@main

      - name: Run ktlint
        run: ./gradlew ktlintCheck --no-daemon

  website:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Build website
        working-directory: website
        run: npm run build

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source (with submodules)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Nucleus
        uses: kdroidFilter/Nucleus/.github/actions/setup-nucleus@main

      - name: Run tests with coverage
        run: ./gradlew :SeforimApp:jvmTest :SeforimApp:koverXmlReport :SeforimApp:koverHtmlReport --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-reports
          path: '**/build/reports/tests/'
          retention-days: 7

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-reports
          path: |
            **/build/reports/kover/
          retention-days: 7

  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x64 (DEB)
          - os: ubuntu-latest
            arch: amd64
            build_task: ":SeforimApp:packageGraalvmDeb"
            graalvm: true

          # Windows x64 (GraalVM)
          - os: windows-latest
            arch: amd64
            build_task: ":SeforimApp:packageGraalvmNsis"
            graalvm: true
            rust_target: x86_64-pc-windows-msvc

          # Windows ARM64 (JBR - no Liberica NIK)
          - os: windows-11-arm
            arch: arm64
            build_task: ":SeforimApp:createReleaseDistributable :SeforimApp:packageReleaseNsis"
            graalvm: false
            rust_target: aarch64-pc-windows-msvc

          # macOS Apple Silicon (ARM64)
          - os: macos-26
            arch: arm64
            build_task: ":SeforimApp:packageGraalvmDmg"
            graalvm: true

    steps:
      - name: Checkout source (with submodules)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Nucleus
        uses: kdroidFilter/Nucleus/.github/actions/setup-nucleus@main

      - name: Setup GraalVM (Liberica NIK)
        if: matrix.graalvm
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'liberica'

      # Build
      - name: Build
        run: ./gradlew ${{ matrix.build_task }} --no-daemon
        shell: bash

      # Build Rust installer for Windows
      - name: Install Rust toolchain
        if: runner.os == 'Windows'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Build Windows installer (.exe)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd installer

          # Create resources directory
          New-Item -ItemType Directory -Force -Path resources | Out-Null

          # Copy splash image
          Copy-Item "..\SeforimApp\src\jvmMain\assets\common\splash.png" "resources\splash.png"

          # Find NSIS installer (GraalVM or Release path)
          $nsisFile = Get-ChildItem "..\SeforimApp\build\compose\binaries\main\graalvm-nsis\zayit-*-nsis.exe","..\SeforimApp\build\compose\binaries\main-release\nsis\zayit-*-nsis.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $nsisFile) {
            Write-Error "NSIS installer not found"
            exit 1
          }
          Copy-Item $nsisFile.FullName "resources\zayit-nsis.exe"
          $nsisBaseName = $nsisFile.BaseName
          Write-Host "Found NSIS: $nsisBaseName"

          # Build Rust installer
          cargo build --release --target ${{ matrix.rust_target }}

          # Rename exe to match NSIS name
          $exeName = "$nsisBaseName.exe"
          Move-Item "target\${{ matrix.rust_target }}\release\zayit-installer.exe" "target\${{ matrix.rust_target }}\release\$exeName"
          Write-Host "Built installer: $exeName"

      # Upload Artifacts
      - name: Upload Linux .deb
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v6
        with:
          name: linux-deb-${{ matrix.arch }}
          path: SeforimApp/build/compose/binaries/main/graalvm-deb/*.deb
          if-no-files-found: error

      - name: Upload Windows .exe installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v6
        with:
          name: windows-exe-${{ matrix.arch }}
          path: installer/target/${{ matrix.rust_target }}/release/*.exe
          if-no-files-found: error

      - name: Upload macOS .dmg
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v6
        with:
          name: macos-dmg-${{ matrix.arch }}
          path: SeforimApp/build/compose/binaries/main/graalvm-dmg/*.dmg
          if-no-files-found: error
