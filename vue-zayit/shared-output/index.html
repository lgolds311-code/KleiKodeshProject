                Title: row[1],
                Author: row[2],
                Printing_Place: row[3],
                Printing_Year: row[4],

          error: (error) => {
            reject(error);
          }
        });
      });
    } catch (error) {
      console.error("Error loading CSV:", error);
      throw error;
    }
  }
}

/* Main CSS - Imports all style modules */

/* Theme CSS Variables */

/* Light mode (default) - Windows 11 Fluent Design + VS Code style */

:root { 
  /* Background colors - VS Code Light */
  --bg-primary: #ffffff;        /* Main background */
  --bg-primary-rgb: 255, 255, 255; /* RGB values for transparency */
  --bg-secondary: #f8f8f8;      /* More neutral secondary background (was #f3f3f3) */
  --bg-secondary-rgb: 248, 248, 248; /* RGB values for transparency */
  
  /* Border colors - Fluent subtle borders */
  --border-color: #e5e5e5;      /* Borders and dividers */
  
  /* Text colors - Fluent text hierarchy */
  --text-primary: #1f1f1f;      /* Main text color (Fluent primary) */
  --text-secondary: #5a5a5a;    /* Secondary text (balanced visibility) */
  
  /* Interactive states - Fluent hover/press */
  --hover-bg: rgba(0, 0, 0, 0.06);   /* Background on hover (Fluent subtle) */
  --active-bg: rgba(0, 0, 0, 0.09);  /* Background when clicked (Fluent rest) */
  
  /* Accent colors - Windows 11 default blue */
  --accent-color: #0078d4;           /* Primary accent (Fluent blue) */
  --accent-bg: rgba(0, 120, 212, 0.1);  /* Light accent background */
  --accent-bg-light: rgba(0, 120, 212, 0.05);  /* Extra light accent background */
  
  /* Font families - customizable via settings */
  --header-font: 'Segoe UI Variable', 'Segoe UI', system-ui, sans-serif;
  --text-font: 'Times New Roman', Times, serif;
  
  /* Reading background and text colors - customizable via settings */
  --reading-bg-color: '';
  --reading-text-color: var(--text-primary);
}

/* Dark mode - Windows 11 Fluent Dark + VS Code Dark */

:root.dark {
  /* Background colors - VS Code Dark */
  --bg-primary: #1e1e1e;        /* Main background (VS Code dark) */
  --bg-primary-rgb: 30, 30, 30; /* RGB values for transparency */
  --bg-secondary: #2d2d2d;      /* More neutral secondary background (was #252526) */
  --bg-secondary-rgb: 45, 45, 45; /* RGB values for transparency */
  
  /* Border colors - Fluent dark borders */
  --border-color: #3b3b3b;      /* Borders (Fluent dark divider) */
  
  /* Text colors - Fluent dark text */
  --text-primary: #ffffff;      /* Main text (Fluent primary on dark) */
  --text-secondary: #a6a6a6;    /* Secondary text (balanced visibility on dark) */
  
  /* Interactive states - Fluent dark hover/press */
  --hover-bg: rgba(255, 255, 255, 0.08);   /* Light overlay on hover */
  --active-bg: rgba(255, 255, 255, 0.12);  /* Light overlay when clicked */
  
  /* Accent colors - Windows 11 blue on dark */
  --accent-color: #60cdff;                 /* Lighter blue for dark mode */
  --accent-bg: rgba(96, 205, 255, 0.15);   /* Light blue background */
  --accent-bg-light: rgba(96, 205, 255, 0.08);  /* Extra light accent background */
  
  /* Font families inherit from light mode */
}

/* Icon theming for dark mode */

/* For image files (PNG, SVG as <img>) - use class="themed-icon" */

/* For inline SVGs - only apply fill to SVGs that explicitly use it */

/* Don't apply global fill rule as it breaks stroke-based icons */

/* Scrollbar theming */

* {
  scrollbar-color: rgba(0, 0, 0, 0.3) rgba(0, 0, 0, 0.05);
}

:root.dark * {
  scrollbar-color: rgba(255, 255, 255, 0.3) rgba(255, 255, 255, 0.05);
}

/* Dark mode: invert button icons automatically */

:root.dark button img {
  filter: invert(1) brightness(1.2);
  /* Invert colors and brighten slightly */
}

/* Global SVG color */

svg {
  color: var(--text-secondary);
}

  align-items: center;
  justify-content: flex-end;
}

.flex-center-start {
  display: flex;
  align-items: center;
  justify-content: flex-start;
}

.flex-between {
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: space-between;
}

.justify-end {
  display: flex;
  justify-content: flex-end;
}

.height-fill {
   height: 100%;
}

.width-fill {
  width: 100%;
}

.overflow-y {
  overflow-y: auto;
}

.overflow-x {
  overflow-x: auto;
}

.rtl-flip {
  transform: scaleX(-1);
}

.rotate-90 {
  transform: rotate(-90deg);
}

/* Text & Typography Utilities */

.center-text {
  text-align: center;
}

.bold {
  font-weight: 600;
}

.smaller-em {
  font-size: 0.85em;
}

.smaller-rem {
  font-size: 0.85rem;
}

.text-secondary {
  color: var(--text-secondary);
}

.ellipsis {
  white-space: nowrap; /* Prevents text from wrapping to the next line */
  overflow: hidden; /* Hides any overflowing content */
  text-overflow: ellipsis; /* Displays an ellipsis (...) for truncated text */
}

.selectable {
  -webkit-user-select: text !important;
  -moz-user-select: text !important;
  -ms-user-select: text !important;
  user-select: text !important;
}

.selectable *,
.selectable [v-html] *,
.selectable .link-item * {
  -webkit-user-select: text !important;
  -moz-user-select: text !important;
  -ms-user-select: text !important;
  user-select: text !important;
}

.line-1\.4 {
  line-height: 1.4;
}

.line-1\.6 {
  line-height: 1.6;
}

.justify {
 text-align: justify;
}

/* Component Utilities */

.bar {
  background-color: var(--bg-secondary);
  border-bottom: 1px solid var(--border-color);
  padding: 0.5rem;
}

.tree-node {
  gap: 12px;
  padding: 12px 20px;
  min-height: 44px; /* Touch-friendly minimum height */
  touch-action: manipulation;
}

/* Small icon utility for compact UI elements */

.small-icon {
  width: 12px !important;
  height: 12px !important;
}

/* Interactive States */

.focus-accent:focus {
  outline: none;
  background: var(--accent-bg-light);
}

.reactive-icon:focus > svg {
    color: var(--accent-color);
    opacity: 1;
}

.reactive-icon:hover > svg {
    color: var(--accent-color);
    opacity: 1;
}

/* Only apply hover effects on devices that support hover */

@media (hover: hover) {
  .hover-bg:hover {
    background: var(--hover-bg);
  }
}

/* Use active states for touch devices */

@media (hover: none) and (pointer: coarse) {
  .hover-bg:active {
    background: var(--active-bg);
  }
}

.keyboard-active {
    transform: scale(0.98);
    background: var(--active-bg);
}

.click-effect:active {
  transform: scale(0.98);
  background: var(--active-bg);
}

/* Touch-specific interactive class */

.touch-interactive {
  touch-action: manipulation;
  transition: transform 0.1s ease, background-color 0.1s ease;
}

.touch-interactive:active {
  transform: scale(0.98);
  background: var(--active-bg);
}

/* Animations */

.loading-spinner {
    font-size: 24px;
    color: var(--accent-color);
    animation: spin 1s linear infinite;
}

@keyframes spin {
    from {
        transform: rotate(0deg);
    }
    to {
        transform: rotate(360deg);
    }
}

/* Slide animation */

.slide-enter-active,
.slide-leave-active {
  transition: all 0.15s ease;
}

.slide-enter-from,
.slide-leave-to {
  opacity: 0;
  transform: translateY(-0.5rem);
}

/* Fade animation */

.fade-enter-active,
.fade-leave-active {
  transition: opacity .4s;
}

.fade-enter-from,
.fade-leave-to {
  opacity: 0;
}

.fade-enter-to,
.fade-leave-from {
  opacity: 1;
}

/* Utility class for spinning icons */

.animate-spin {
  animation: spin 1s linear infinite;
}

/* Global button styles - VS Code style with touch support */

button {
  width: 2rem;
  /* Button width (matches vue-tabs) */
  height: 2rem;
  /* Button height (matches vue-tabs) */
  padding: 0.375rem;
  /* Internal padding (matches vue-tabs) */
  background: transparent;
  /* Transparent background by default */
  border: none;
  /* No border */
  border-radius: 0.25rem;
  /* Slightly rounded corners (matches vue-tabs) */
  font-size: 1.25rem;
  /* Icon/text size (matches vue-tabs) */
  color: var(--text-primary);
  /* Secondary text color */
  cursor: pointer;
  /* Show hand cursor */
  display: flex;
  /* Flex layout */
  align-items: center;
  /* Vertically center content */
  justify-content: center;
  /* Horizontally center content */
  flex-shrink: 0;
  /* Prevent button from shrinking */
  opacity: 0.8;
  /* Touch-friendly properties */
  touch-action: manipulation;
  /* Prevent double-tap zoom */
  transition: transform 0.1s ease, background-color 0.1s ease;
  /* Smooth transitions */
}

/* Button hover effect - only on devices that support hover */

@media (hover: hover) {
  button:hover {
    background: var(--hover-bg);
    /* Light background on hover */
    color: var(--text-primary);
    /* primary text color on hover */
    opacity: 0.9;
  }
}

/* Button active/pressed effect - works on both mouse and touch */

button:active {
  background: var(--active-bg);
  /* Darker background when pressed */
  transform: scale(0.95);
  /* Touch-friendly scale effect */
}

/* Ensure minimum touch target size on touch devices */

@media (hover: none) and (pointer: coarse) {
  button {
    min-width: 44px;
    min-height: 44px;
  }
}

/* Images and SVGs inside buttons */

button img,
button svg {
  width: 1.25rem;
  /* Icon size (matches vue-tabs) */
  height: 1.25rem;
  /* Icon size (matches vue-tabs) */
  pointer-events: none;
  /* Prevent icon from blocking clicks */
}

/* Iconify icons inside buttons - inherit color */

button .iconify {
  color: inherit !important;
}

button .iconify svg,
button .iconify svg * {
  fill: currentColor !important;
  stroke: currentColor !important;
}

/* Icon/Text Button */

.text-icon-button {
  padding: 0.5rem;
  /* color: var(--text-primary); */
  font-size: 1.2rem;
}

/* Input & Search Styles */

input[type="text"] {
  font-size: 1rem; 
  border: 1px solid var(--border-color);
  border-radius: 16px;
  outline: none;
  padding: 6px 12px;
  background: var(--bg-primary);
  color: var(--text-primary);
}

/* Focus state - softer accent highlight */

input[type="text"]:focus {
  box-shadow: 0 0 0 1px rgba(0, 130, 220, 0.75);
}

/* Placeholder text - muted and semi-transparent */

input[type="text"]::placeholder {
  color: var(--text-secondary);
  opacity: 0.6;
}

/* Cursor Utilities */

.c-pointer {
  cursor: pointer;
}

/* Touch-friendly styles */

/* Touch-active feedback class */

.touch-active {
  transform: scale(0.95) !important;
  background-color: var(--active-bg) !important;
  transition: transform 0.1s ease, background-color 0.1s ease !important;
}

/* Ensure touch targets are at least 44px (iOS) / 48px (Android) */

.touch-target {
  min-height: 44px;
  min-width: 44px;
}

/* Better touch feedback */

.touch-feedback {
  transition: transform 0.1s ease, background-color 0.1s ease;
}

.touch-feedback:active {
  transform: scale(0.95);
  background-color: var(--active-bg);
}

/* Prevent text selection on touch */

.touch-no-select {
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  -khtml-user-select: none;
  -moz-user-select: none;
  -ms-user-select: none;
  user-select: none;
}

/* Touch-friendly scrolling */

.touch-scroll {
  -webkit-overflow-scrolling: touch;
  scroll-behavior: smooth;
}

/* Improve touch precision for small elements */

.touch-precise {
  touch-action: manipulation;
}

/* Disable double-tap zoom on specific elements */

.touch-no-zoom {
  touch-action: manipulation;
}

/* Better touch feedback for buttons */

button.touch-button {
  min-height: 44px;
  min-width: 44px;
  touch-action: manipulation;
  transition: transform 0.1s ease, background-color 0.1s ease;
}

button.touch-button:active {
  transform: scale(0.95);
}

/* Touch-friendly dropdowns */

.touch-dropdown {
  min-height: 44px;
}

.touch-dropdown-item {
  min-height: 44px;
  padding: 12px 16px;
  touch-action: manipulation;
}

/* Touch-friendly tree nodes */

.touch-tree-node {
  min-height: 44px;
  padding: 12px 20px;
  touch-action: manipulation;
}

/* Improve touch scrolling performance */

.touch-container {
  -webkit-overflow-scrolling: touch;
  scroll-behavior: smooth;
  overscroll-behavior: contain;
}

/* Touch-friendly search input */

.touch-search-input {
  min-height: 44px;
  padding: 12px 16px;
  touch-action: manipulation;
}

/* Better touch feedback for interactive elements */

.touch-interactive {
  touch-action: manipulation;
  transition: transform 0.1s ease, background-color 0.1s ease;
}

.touch-interactive:active {
  transform: scale(0.98);
  background-color: var(--active-bg);
}

/* Prevent accidental zooming on form inputs */

input, textarea, select {
  touch-action: manipulation;
}

/* Ensure proper touch handling for RTL layout */

.rtl-touch {
  direction: rtl;
  text-align: right;
}

/* Touch-friendly resize handles */

.touch-resize-handle {
  min-width: 20px;
  min-height: 20px;
  touch-action: none;
  cursor: ns-resize;
}

/* Media query for touch devices */

@media (hover: none) and (pointer: coarse) {
  /* Increase touch targets on touch devices */
  button {
    min-height: 44px;
    min-width: 44px;
  }
  
  .tree-node {
    min-height: 44px;
    padding: 12px 20px;
  }
  
  .dropdown-item {
    min-height: 44px;
    padding: 12px 16px;
  }
  
  /* Remove hover effects on touch devices */
  .hover-bg:hover {
    background: transparent;
  }
  
  /* Use active states instead */
  .hover-bg:active {
    background: var(--active-bg);
  }
}

/* Improve touch scrolling on mobile */

@media (max-width: 768px) {
  .overflow-y {
    -webkit-overflow-scrolling: touch;
    overscroll-behavior-y: contain;
  }
  
  .overflow-x {
    -webkit-overflow-scrolling: touch;
    overscroll-behavior-x: contain;
  }
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  /* transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1); */
  -webkit-user-select: none;
  -moz-user-select: none;
  -ms-user-select: none;
  user-select: none;
  /* Touch-friendly defaults */
  -webkit-tap-highlight-color: transparent; /* Remove iOS tap highlight */
  touch-action: manipulation; /* Prevent double-tap zoom by default */
}

html, body {
  height: 100%;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
  -webkit-font-smoothing: antialiased;

  color: var(--text-primary);
  background-color: var(--bg-primary);
  direction: rtl;
  overflow: hidden;
}

#app {
  height: 100%;
  direction: inherit;
}

mark {
  background-color: rgba(255, 235, 59, 0.4);
  color: inherit;
}

mark.current {
  background-color: rgba(255, 152, 0, 0.6);
}
