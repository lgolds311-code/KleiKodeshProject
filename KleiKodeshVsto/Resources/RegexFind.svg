<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Teal-green gradient — distinct from blue WebSites -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E8A6E"/>
      <stop offset="55%" stop-color="#0F6B52"/>
      <stop offset="100%" stop-color="#084D3A"/>
    </linearGradient>
    <radialGradient id="shine" cx="30%" cy="25%" r="55%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.0"/>
    </radialGradient>
    <!-- Lens glass -->
    <radialGradient id="lens" cx="38%" cy="32%" r="62%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.04"/>
    </radialGradient>
    <clipPath id="lc">
      <circle cx="42" cy="42" r="24"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="22" ry="22" fill="url(#bg)"/>
  <rect width="100" height="100" rx="22" ry="22" fill="url(#shine)"/>

  <!-- Handle shadow -->
  <line x1="62" y1="62" x2="83" y2="83" stroke="#000" stroke-width="11" stroke-linecap="round" opacity="0.25"/>
  <!-- Handle -->
  <line x1="61" y1="61" x2="82" y2="82" stroke="white" stroke-width="9" stroke-linecap="round" opacity="0.90"/>
  <!-- Handle inner highlight -->
  <line x1="59" y1="63" x2="78" y2="82" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>

  <!-- Lens shadow -->
  <circle cx="42" cy="43.5" r="24" fill="#000" opacity="0.22"/>

  <!-- Lens glass fill -->
  <circle cx="42" cy="42" r="24" fill="url(#lens)"/>

  <!-- Lens ring -->
  <circle cx="42" cy="42" r="24" fill="none" stroke="white" stroke-width="5.5" opacity="0.92"/>

  <!-- .* text inside lens -->
  <text x="42" y="49"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="18"
        fill="white"
        text-anchor="middle"
        font-weight="700"
        opacity="0.95">.*</text>

  <!-- Lens specular -->
  <ellipse cx="33" cy="33" rx="8" ry="5" fill="white" opacity="0.13" transform="rotate(-30,33,33)"/>
</svg>
