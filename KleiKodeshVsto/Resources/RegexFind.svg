<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!--
    Hand-built search icon — simple clean geometry, no complex paths
    Lens: stroke circle, handle: stroke line — outline style like Outlook
    Color: #E3008C
  -->

  <!-- Lens ring — thick stroke, no fill -->
  <circle cx="10" cy="10" r="6.5" fill="none" stroke="#E3008C" stroke-width="1.5"/>

  <!-- Handle -->
  <line x1="15" y1="15" x2="21" y2="21" stroke="#E3008C" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Small sparkle star top-right of lens — 3 lines -->
  <line x1="15.5" y1="4.5" x2="15.5" y2="7.5" stroke="#E3008C" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="14"   y1="5.2" x2="17"   y2="6.8" stroke="#E3008C" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="14"   y1="6.8" x2="17"   y2="5.2" stroke="#E3008C" stroke-width="1.2" stroke-linecap="round"/>
</svg>
