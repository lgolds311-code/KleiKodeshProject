<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Warm amber-orange gradient — distinct from others -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C97B00"/>
      <stop offset="55%" stop-color="#A05E00"/>
      <stop offset="100%" stop-color="#7A4200"/>
    </linearGradient>
    <radialGradient id="shine" cx="30%" cy="25%" r="55%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.0"/>
    </radialGradient>
    <!-- Parchment gradient -->
    <linearGradient id="parch" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.96"/>
      <stop offset="100%" stop-color="#FFE8B0" stop-opacity="0.90"/>
    </linearGradient>
    <!-- Roller gradient -->
    <linearGradient id="roller" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FFD580" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="22" ry="22" fill="url(#bg)"/>
  <rect width="100" height="100" rx="22" ry="22" fill="url(#shine)"/>

  <!-- Scroll shadow -->
  <rect x="27" y="29" width="46" height="43" rx="3" fill="#000" opacity="0.20"/>

  <!-- Parchment -->
  <rect x="25" y="27" width="50" height="43" rx="3" fill="url(#parch)"/>

  <!-- Text lines — warm brown on parchment -->
  <g opacity="0.70">
    <line x1="32" y1="38" x2="68" y2="38" stroke="#7A4200" stroke-width="2.8" stroke-linecap="round"/>
    <line x1="32" y1="46" x2="68" y2="46" stroke="#7A4200" stroke-width="2.8" stroke-linecap="round"/>
    <line x1="32" y1="54" x2="68" y2="54" stroke="#7A4200" stroke-width="2.8" stroke-linecap="round"/>
    <line x1="32" y1="62" x2="54" y2="62" stroke="#7A4200" stroke-width="2.8" stroke-linecap="round"/>
  </g>

  <!-- Left roller shadow -->
  <rect x="17" y="22" width="10" height="56" rx="5" fill="#000" opacity="0.18"/>
  <!-- Left roller -->
  <rect x="15" y="20" width="10" height="56" rx="5" fill="url(#roller)"/>
  <!-- Left roller highlight -->
  <rect x="17" y="24" width="3" height="48" rx="1.5" fill="white" opacity="0.30"/>

  <!-- Right roller shadow -->
  <rect x="73" y="22" width="10" height="56" rx="5" fill="#000" opacity="0.18"/>
  <!-- Right roller -->
  <rect x="75" y="20" width="10" height="56" rx="5" fill="url(#roller)"/>
  <!-- Right roller highlight -->
  <rect x="77" y="24" width="3" height="48" rx="1.5" fill="white" opacity="0.30"/>

  <!-- Left top knob -->
  <ellipse cx="20" cy="20" rx="9" ry="4" fill="white" opacity="0.88"/>
  <!-- Left bottom knob -->
  <ellipse cx="20" cy="76" rx="9" ry="4" fill="white" opacity="0.75"/>
  <!-- Right top knob -->
  <ellipse cx="80" cy="20" rx="9" ry="4" fill="white" opacity="0.88"/>
  <!-- Right bottom knob -->
  <ellipse cx="80" cy="76" rx="9" ry="4" fill="white" opacity="0.75"/>
</svg>
