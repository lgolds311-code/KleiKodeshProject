<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!--
    Duplicate pane — two overlapping windows, purple
    Built from filled rectangles with rounded corners
  -->
  <!-- Back window (offset) -->
  <rect x="5" y="3" width="14" height="11" rx="2" ry="2" fill="#7B5EA7" opacity="0.5"/>
  <!-- Front window -->
  <rect x="3" y="7" width="14" height="11" rx="2" ry="2" fill="#7B5EA7"/>
  <!-- Window title bar line -->
  <rect x="3" y="7" width="14" height="2.5" rx="2" ry="2" fill="#5A3F8A"/>
  <!-- Divider line in front window -->
  <rect x="9.5" y="9.5" width="1" height="7" fill="white" opacity="0.4"/>
</svg>
